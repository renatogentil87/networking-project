version: 0.2

phases:
  install:
    commands:
      - echo "Installing Terraform"
      - wget https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip
      - unzip terraform_1.7.0_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - echo "Initializing Terraform for both regions"
      - cd regions/ca-central-1
      - terraform init
      - cd ../..
      - cd regions/eu-west-2
      - terraform init
      - cd ../..

  build:
    commands:
      - echo "=== Applying Canada Region ==="
      - cd regions/ca-central-1
      - terraform apply -auto-approve tfplan-ca
      - cd ../..

      - echo "=== Applying London Region ==="
      - cd regions/eu-west-2
      - terraform apply -auto-approve tfplan-eu
      - cd ../..

  post_build:
    commands:
      - echo "Both regions applied successfully"
